<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        width: 100%;
        height: 100vh;
        background-color: black;
        display: grid;
        gap: 20px;
        grid-template-columns:repeat(4, 1fr);
    }
    .box{
        background-color: yellow;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    @media(max-width:400px){
        .container{
            display: grid;
            grid-template-columns: 1fr !important;
        }
    }
     @media(max-width:800px){
        .container{
            display: grid;
            grid-template-columns:repeat(3,1fr);
        }
    }
</style>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        <div class="box">10</div>
        <div class="box">11</div>
        <div class="box">12</div>
    </div>
</body>
</html>
