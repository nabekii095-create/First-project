<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
            margin: 0;
        }
        .container{
            width: 100%;
            height: 100vh;
            background-color: aqua;
            color: white;
            line-height: 60px;
            padding-top: 160px;
            padding-left: 185px;
        }
        .background{
            background-color:#44444E;
            width: 80%;
        }
        .top{
            display: flex;
            gap: 47%;
            margin-left: 7px;
        }
        .onleft{
            justify-content: center;
        }
        .enter>input{
            border-radius: 20px;
            height: 35px;
            width: 200px;
            border: none; 
            background: transparent; 
            outline: none;
            color: white;
        }
        .sub{
            background-color: royalblue;
            border-radius: 40px;
            width: 100px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
           
        }
        .search{
            width: 330px;
            height: 45px;
            align-items: center;
            justify-content: center;
            display: flex;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            border: 2px solid white;
        }
        .i1{
            display: flex;
            align-items: center;
        }
        .i2{
            display: flex;
            align-items: center;
        }
        .end{
            display: flex;
            align-items: center;
            gap: 78%;
            margin-left: 7px;
        }
        .en{
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .bigw{
            display: flex;
            gap: 22%;
            margin-left: 7px;
        }
        .title{
            line-height: 30px;
            margin-top: 10px;
        }
        .icon{
            font-size: 20px;
        }
        hr{
            width: 99%;
         margin-left: 7px;
        }   
    </style>
</head>
<body>
    <div class="container"> 
        <div class="background">
            <div class="top"> 
              <div class="title">
                <h1>Sip Your Way to Wellness- <br>One Cup At A Time</h1>
              </div>
              <div class="onleft">
              <div class="word">
                <h3>Get in Touch</h3>
              </div>
              <div class="search">
                 <div class="enter">
                 <input type="text" placeholder="Enter your email">
                 </div>
                 <div class="sub">
                    <h3>Subcribe</h3>
                 </div>
              </div>
              </div>
            </div>
            <div class="bigw">
             <div class="w1">
                <p>CONTACT INFORMATION</p>
              <div class="i1">
                    <i class="fa-regular fa-envelope"></i>
                    <p>support@ra.com</p>
              </div>
              <div class="i2">
                    <i class="fa-solid fa-phone"></i>
                    <p>+855-168-168</p>
              </div>
             </div>
             <div class="w2">
                <p>COMPANY</p>
                <p>Features</p>
                <p>About us</p>
                <p>Contact</p>
                <p>Pricing</p>
             </div>
             <div class="w3">
                <p>HELP</p>
                <p>FAQ</p>
                <p>Help Center</p>
                <p>Support</p>
             </div>
             <div class="w4">
                <p>FOLLOW US</p>
                <div class="icon">
                  <i class="fa-brands fa-facebook"></i>
                  <i class="fa-brands fa-instagram"></i>
                  <i class="fa-brands fa-square-youtube"></i>
                </div>
             </div>
            </div>
            <hr>
            <div class="end">
                 <p>@2025 www.com.kh</p>
             <div class="en">
                <p>privacy</p>
                <p>Condition</p>
             </div>
            </div>
           
         </div>
 </div>     
</body>
</html>
