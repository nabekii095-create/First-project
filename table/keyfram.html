<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        width: 100%;
        height: 100vh;
        background-color: pink;
        justify-content: center;
        align-items: center;
        display: flex;
    }
    .circle{
        width: 100px;
        height: 100px;
        background-color: green;
        animation:test 1s infinite;
        border-radius: 50%;
    }
    @keyframes test{
        from{
          transform:translate(0px);
        }
        to{
        transform: translate(200px) scale(3);
        }
    }
   .box{
      width: 200px;
      height: 100px;
      background-color: gainsboro;
      border-radius: 100px;
   }
</style>
<body>
    <div class="container">
        <div class="box">
          <div class="circle">

        </div>

        </div>
    </div>
</body>
</html>
