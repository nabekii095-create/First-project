<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <style>
      .container {
         width: 100%;
         height: 100vh;
         display: flex;
         background-color: whitesmoke;
         justify-content: center;
         align-items: center;
      }

      .background {
         width: 70%;
         height: 100%;
         background-repeat: no-repeat;
         background-position: center;
         background-image: url(https://i.pinimg.com/736x/1d/9e/01/1d9e016831823d5109ea6187577d2673.jpg);
         align-items: center;
         display: flex;
      }

      .background>h1 {
         color: blue;
         padding-left: 30%;
         font-size: 60px;
         align-items: center;
         margin-top: 40%;
         font-family: Arial, Helvetica, sans-serif;
      }

      .checkbox {
         display: flex;
         justify-content: space-between;
         align-items: center;
      }

      .form {
         width: 50%;
         height: 80%;
         justify-content: center;
         align-items: center;
         line-height: 130px;
         font-family: Arial, Helvetica, sans-serif;
      }

      .Login {
         width: 80%;
         height: 50px;
         justify-content: center;
         align-items: center;
         background-color: blue;
         font-size: 25px;
         color: white;
         text-align: center;
         line-height: 45px;
      }

      .username>input {
         width: 80%;
         height: 40px;
      }

      .password>input {
         width: 80%;
         height: 0px;
      }

      .top-title {
         line-height: 30px;
      }

      .username {
         line-height: 50px;
      }

      .password {
         line-height: 50px;
      }
      .check{
         display: flex;
         gap: 10px;
      }
      .checkbox>a{
       margin-right: 20px;
      }
   </style>
</head>

<body>
   <div class="container">
      <div class="background">
         <h1>Welcome <br>Back!</h1>
      </div>

      <div class="form">
         <div class="top-title">
            <h1>Login</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Suscipit, sed <br>sit animal dolor sit amet.</p>
         </div>
         <div class="username">
            <label for="">Username</label><br>
            <input type="text">
         </div>
         <div class="password">
            <label for="">Password</label><br>
            <input type="password">
         </div>
         <div class="checkbox">
            <div class="check">
               <input type="checkbox">
               <p>remember me</p>
            </div>
            <a href="">Forgot password</a>
         </div>

         <div class="Login">
            Login
         </div>
         <div class="link">
            New user?<a href="">Sign up</a>

         </div>
      </div>

   </div>
</body>

</html>
